name: Desktop Builds

run-name: >-
  ${{
    startsWith(github.ref, 'refs/tags/') && format('OBS Plugin Installer {0}', github.ref_name)
    || github.event_name == 'workflow_dispatch' && 'OBS Plugin Installer manual build'
    || startsWith(github.event.head_commit.message, 'v') && format('OBS Plugin Installer {0}', github.event.head_commit.message)
    || format('OBS Plugin Installer build ({0})', github.ref_name)
  }}

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows x64
    runs-on: [self-hosted, windows, arm64]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release version metadata
        run: npm run check:release-version
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      - name: Build Tauri release bundles
        run: npm run build:release -- --bundles nsis,msi --target x86_64-pc-windows-msvc
        env:
          VITE_POSTHOG_PROJECT_KEY: ${{ vars.VITE_POSTHOG_PROJECT_KEY }}
          VITE_POSTHOG_API_HOST: ${{ vars.VITE_POSTHOG_API_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATE_BASE_URL: ${{ vars.TAURI_UPDATE_BASE_URL }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATE_BUNDLE_TYPE: nsis
          CARGO_BUILD_TARGET: x86_64-pc-windows-msvc

      - name: Upload workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: obs-plugin-installer-windows-x64-${{ github.sha }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.sig

      - name: Upload release artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ format('OBS Plugin Installer {0}', github.ref_name) }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.sig

  publish-main-release:
    name: Publish main prerelease
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - build-release
    runs-on: [self-hosted, windows, arm64]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: obs-plugin-installer-windows-x64-${{ github.sha }}
          path: release-artifacts
          merge-multiple: true

      - name: Read prerelease metadata
        id: metadata
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          RELEASE_TAG="main-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}"
          RELEASE_NAME="OBS Plugin Installer v${APP_VERSION} build ${GITHUB_RUN_NUMBER}"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify prerelease assets exist
        shell: bash
        run: |
          mapfile -t release_files < <(find release-artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.sig' \
          \))

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release assets were found in release-artifacts."
            exit 1
          fi

          printf 'Publishing %s release asset(s):\n' "${#release_files[@]}"
          printf ' - %s\n' "${release_files[@]}"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.metadata.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            Automated desktop release from `main`.

            Version: `${{ steps.metadata.outputs.app_version }}`
            Commit: `${{ github.sha }}`
            Short SHA: `${{ steps.metadata.outputs.short_sha }}`
            Branch: `${{ github.ref_name }}`
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.sig